<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Angel Karungi</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== AI BACKGROUND ===== */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background-image:
        linear-gradient(rgba(56,189,248,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveGrid 20s linear infinite;
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(56,189,248,0.12) 2px, transparent 2px);
      background-size: 80px 80px;
      animation: floatDots 18s linear infinite;
      z-index: -1;
    }

    @keyframes moveGrid {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }

    @keyframes floatDots {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    /* ===== SECTION ===== */
    .contact-section {
      padding: 70px 20px;
      text-align: center;
    }

    .contact-section h2 {
      color: #38bdf8;
      margin-bottom: 25px;
      font-size: 32px;
    }

    .contact-card {
      max-width: 600px;
      margin: auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border-top: 4px solid #38bdf8;
      transition: 0.3s;
    }

    .contact-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(56,189,248,0.2);
    }

    .contact-card p {
      margin-bottom: 15px;
      color: #cbd5e1;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      outline: none;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #38bdf8;
    }

    .contact-form button {
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
      font-weight: bold;
    }

    .contact-form button:hover {
      transform: scale(1.05);
      background: #0ea5e9;
    }

    .contact-info {
      margin-top: 25px;
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.8;
    }

    .highlight {
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>

<body>

<section class="contact-section">
  <h2>Contact Me</h2>

  <div class="contact-card">

    <p>
      Let’s connect for collaborations, projects, or tech opportunities 👋
    </p>

    <form class="contact-form">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <p>📧 Email: <span class="highlight">gumushobeangel@gmail.com</span></p>
      <p>📱 Phone: <span class="highlight">0740230081 / 0764644678</span></p>
      <p>🌎 Website: <span class="highlight">angelkarungi.com</span></p>
    </div>

  </div>
</section>

</body>
</html>
